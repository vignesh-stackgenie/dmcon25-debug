apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: task5
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7.0
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_DATABASE
          value: mydb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: task5
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
      - name: webapp
        image: busybox:1.36
        command: ["/bin/sh", "-c", "echo 'Starting webapp...' && echo 'Testing MongoDB connection...' && echo 'MONGODB_URI:' $MONGODB_URI && echo 'Attempting to connect to MongoDB...' && HOST=$(echo $MONGODB_URI | sed 's|mongodb://||' | cut -d: -f1) && PORT=$(echo $MONGODB_URI | sed 's|mongodb://||' | cut -d: -f2 | cut -d/ -f1) && echo 'Testing connection to:' $HOST:$PORT && if wget -q --spider --timeout=5 http://$HOST:$PORT 2>/dev/null; then echo 'SUCCESS: MongoDB host is reachable'; else echo 'ERROR: Cannot reach' $HOST:$PORT; echo 'This indicates a connection problem'; fi && echo 'Connection test completed' && echo 'App will continue running...' && while true; do echo 'App is running... (MongoDB connection test completed)'; sleep 30; done"]
        env:
        - name: MONGODB_URI
          value: "mongodb://mongodb-service:27017/mongodb"  
        ports:
        - containerPort: 3000
