apiVersion: v1
kind: Pod
metadata:
  name: pvc-consumer
  namespace: task2
spec:
  containers:
  - name: app
    image: busybox:1.38
    command: ["sh", "-c", "sleep 3600"]
    volumeMounts:
    - name: data
      mountPath: /data
  volumes:
  - name: data
    persistentVolumeClaim:
      claimName: data-claim
